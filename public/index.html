<!DOCTYPE html>
<html>
<head><title>Bulk STK Push</title></head>
<body>
<h2>Bulk STK Push</h2>
<textarea id="numbers" rows="10" cols="40" placeholder="2547XXXXXXXX"></textarea><br>
<input id="amount" placeholder="Amount"><br>
<input id="reference" placeholder="Reference"><br>
<button onclick="send()">Send STK Push</button>
<pre id="output"></pre>
<script>
async function send(){
 const numbers=document.getElementById('numbers').value.trim().split('\n');
 const amount=document.getElementById('amount').value;
 const reference=document.getElementById('reference').value;

 const r=await fetch('/api/bulk-stk',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({numbers,amount,reference})
 });
 document.getElementById('output').textContent =
   JSON.stringify(await r.json(),null,2);
}
</script>
</body>
</html>
